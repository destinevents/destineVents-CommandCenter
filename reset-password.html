<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — DestineVents</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/login.css"/>
<link rel="stylesheet" href="css/components/login.css"/>
<link rel="stylesheet" href="css/components/form.css"/>
<link rel="stylesheet" href="css/components/button.css"/>
<link rel="stylesheet" href="css/components/layout.css"/>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-brand">
    <div class="lb-logo">
      <div style="display:flex;align-items:baseline;gap:0;line-height:1">
        <span class="lb-script">destine</span>
        <span class="lb-sans">vents</span>
      </div>
      <div class="lb-divider"></div>
      <div class="lb-tagline">Collective OPC · Baguio City</div>
    </div>
    <div class="lb-quote">
      Almost there.<br>
      <strong>Choose a new password.</strong>
    </div>
    <div class="lb-footer">DestineVents Collective OPC · Internal Tool</div>
  </div>
  <div class="login-form-wrap">
    <div class="login-box" id="reset-form">
      <div class="login-eyebrow">DestineVents · Internal</div>
      <div class="login-greeting">New password.</div>
      <div class="login-sub">Set a new password for your account</div>
      <div class="login-error" id="reset-error"></div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label" for="reset-pass">New Password</label>
        <input class="form-input" id="reset-pass" type="password" placeholder="Minimum 8 characters" autocomplete="new-password"/>
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label" for="reset-confirm">Confirm New Password</label>
        <input class="form-input" id="reset-confirm" type="password" placeholder="Repeat new password" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleReset()"/>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" id="reset-btn" onclick="handleReset()">Update Password</button>
        <button class="btn btn-ghost" onclick="window.location.href='login.html'">Back to Sign In</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js"></script>
<script src="utils/logger.js"></script>
<script src="utils/errorHandler.js"></script>
<script src="utils/validators.js"></script>
<script src="js/auth.js"></script>
<script src="js/reset.js"></script>
</body>
</html>
