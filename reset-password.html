<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — Intern Command Center</title>
<link rel="icon" type="image/svg+xml" href="/assets/icons/favicon-intern.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared/styles/auth.css"/>
</head>
<body>

<div class="auth-screen" id="login-screen">
  <header class="auth-top">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎓</div>
      <div class="auth-logo-text">
        <div class="t1">Intern CMD</div>
        <div class="t2">Command Center</div>
      </div>
    </div>
    <div class="auth-clock">
      <div class="time" id="auth-clock-time">--:--:--</div>
      <div class="zone">PHT · Baguio City</div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-meta">
        <span>Intern Ops · Reset</span>
        <span>Disenyo Digitals</span>
      </div>
      <div class="auth-card-body">
        <div id="reset-form">
          <div class="auth-greeting">New password.</div>
          <div class="auth-sub">Set a new password for your account</div>
          <div class="login-error" id="reset-error"></div>
          <div class="form-group">
            <label class="form-label" for="reset-pass">New Password</label>
            <input class="form-input" id="reset-pass" type="password" placeholder="Minimum 8 characters" autocomplete="new-password"/>
          </div>
          <div class="form-group" style="margin-bottom:24px">
            <label class="form-label" for="reset-confirm">Confirm New Password</label>
            <input class="form-input" id="reset-confirm" type="password" placeholder="Repeat new password" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleReset()"/>
          </div>
          <div class="auth-actions">
            <button class="btn btn-primary" id="reset-btn" onclick="handleReset()">Update Password</button>
            <button class="btn btn-ghost" onclick="window.location.href='login.html'">Back to Sign In</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="auth-foot">DestineVents Collective OPC · Internal Tool</footer>
</div>

<script type="module" src="apps/auth/reset.ts"></script>
</body>
</html>
