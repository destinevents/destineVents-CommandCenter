<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up — Intern Command Center</title>
<link rel="icon" type="image/svg+xml" href="assets/icons/favicon-intern.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared/styles/auth.css"/>
</head>
<body>

<div class="auth-screen">
  <header class="auth-top">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎓</div>
      <div class="auth-logo-text">
        <div class="t1">Intern CMD</div>
        <div class="t2">Command Center</div>
      </div>
    </div>
    <div class="auth-clock">
      <div class="time" id="auth-clock-time">--:--:--</div>
      <div class="zone">PHT · Baguio City</div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card auth-card--wide">
      <div class="auth-card-meta">
        <span>Intern Ops · New Account</span>
        <span>Disenyo Digitals</span>
      </div>
      <div class="auth-card-body">
        <div class="auth-greeting">Join the roster.</div>
        <div class="auth-sub">Create your intern account to start logging hours</div>
        <div class="login-error" id="signup-error"></div>

        <div class="form-group">
          <label class="form-label" for="su-name">Full Name <span class="req">*</span></label>
          <input class="form-input" id="su-name" type="text" placeholder="Juan dela Cruz" autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="su-email">Email <span class="req">*</span></label>
          <input class="form-input" id="su-email" type="email" placeholder="you@destinevents.biz" autocomplete="email"/>
        </div>
        <div class="form-row2">
          <div class="form-group">
            <label class="form-label" for="su-school">School <span class="req">*</span></label>
            <input class="form-input" id="su-school" type="text" placeholder="e.g. BSU, UC, SLU" autocomplete="organization"/>
          </div>
          <div class="form-group">
            <label class="form-label" for="su-program">Program / Course <span class="req">*</span></label>
            <input class="form-input" id="su-program" type="text" placeholder="e.g. IT, CS, HM" autocomplete="off"/>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label class="form-label" for="su-pass">Password <span class="req">*</span></label>
          <input class="form-input" id="su-pass" type="password" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleSignUp()"/>
        </div>

        <div class="auth-actions">
          <button class="btn btn-primary" id="signup-btn" onclick="handleSignUp()">Create Account</button>
          <div class="auth-alt">Already have an account? <a href="login.html">Sign in</a></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="auth-foot">DestineVents Collective OPC · Internal Tool</footer>
</div>

<script type="module" src="shared/auth/signup.ts"></script>
</body>
</html>
