<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Registration</title>
<link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --linen: #faf7f2;
    --parchment: #f5efe4;
    --gold: #b5870b;
    --gold-light: #e8c97a;
    --ink-1: #1a1710;
    --ink-2: #3d3a31;
    --ink-3: #7a7567;
    --ink-4: #e2ddd5;
    --white: #ffffff;
    --green: #2d7a4f;
    --red: #b84040;
  }
  body { background: var(--linen); font-family: 'DM Sans', sans-serif; color: var(--ink-1); min-height: 100vh; }
  .page-wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 64px; }
  .brand-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .brand-mark { width: 32px; height: 32px; background: var(--ink-1); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .brand-mark span { color: var(--gold-light); font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; line-height: 1; }
  .brand-name { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; color: var(--ink-2); }
  .brand-sub { font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .event-card { background: var(--parchment); border: 1px solid var(--ink-4); border-radius: 10px; padding: 24px; margin-bottom: 24px; }
  .event-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .event-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; line-height: 1.2; color: var(--ink-1); margin-bottom: 12px; }
  .event-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
  .event-meta-item { font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 5px; }
  .event-meta-item strong { color: var(--ink-2); font-weight: 500; }
  .price-tag { display: inline-block; background: var(--ink-1); color: var(--gold-light); font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
  .form-card { background: var(--white); border: 1px solid var(--ink-4); border-radius: 10px; padding: 24px; }
  .form-title { font-size: 16px; font-weight: 600; color: var(--ink-1); margin-bottom: 4px; }
  .form-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; border: 1px solid var(--ink-4); border-radius: 6px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink-1); background: var(--linen); outline: none; transition: border-color .15s; }
  .form-input:focus { border-color: var(--gold); }
  .form-optional { font-size: 10px; color: var(--ink-3); margin-left: 4px; font-weight: 400; text-transform: none; letter-spacing: 0; }
  .btn-submit { width: 100%; background: var(--ink-1); color: var(--gold-light); border: none; border-radius: 6px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity .15s; }
  .btn-submit:hover { opacity: .88; }
  .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
  .form-error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }
  .success-wrap { text-align: center; padding: 32px 0; display: none; }
  .success-icon { width: 56px; height: 56px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .success-icon svg { stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; width: 28px; height: 28px; }
  .success-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .success-sub { font-size: 13px; color: var(--ink-3); line-height: 1.7; }
  .page-error { background: #fdecea; border: 1px solid #f5c6c6; border-radius: 8px; padding: 16px; font-size: 13px; color: var(--red); display: none; }
  .loading-text { font-size: 13px; color: var(--ink-3); padding: 32px 0; text-align: center; }
  footer { margin-top: 40px; text-align: center; font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="brand-bar">
    <div class="brand-mark"><span>D</span></div>
    <div>
      <div class="brand-name">DestineVents</div>
      <div class="brand-sub">Event Registration</div>
    </div>
  </div>

  <div id="page-error" class="page-error"></div>
  <div id="event-loading" class="loading-text">Loading event…</div>

  <div id="reg-form-wrap" style="display:none">
    <div class="event-card">
      <div class="event-eyebrow" id="event-brand"></div>
      <div class="event-title" id="event-name"></div>
      <div class="event-meta">
        <div class="event-meta-item">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
          <strong id="event-date"></strong>
        </div>
        <div class="event-meta-item">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <strong id="event-venue"></strong>
        </div>
        <div class="event-meta-item" id="event-type-wrap">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span id="event-type"></span>
        </div>
      </div>
      <div class="price-tag" id="event-price"></div>
    </div>

    <div class="form-card">
      <div class="form-title">Register for this event</div>
      <div class="form-sub">Fill in your details below. We'll confirm your spot via email.</div>
      <form id="reg-form">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input class="form-input" id="reg-name" type="text" placeholder="Your full name" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input class="form-input" id="reg-email" type="email" placeholder="you@email.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-phone">Phone Number <span class="form-optional">(optional)</span></label>
          <input class="form-input" id="reg-phone" type="tel" placeholder="+63 9XX XXX XXXX" autocomplete="tel"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-org">Organization / Company <span class="form-optional">(optional)</span></label>
          <input class="form-input" id="reg-org" type="text" placeholder="Where are you from?" autocomplete="organization"/>
        </div>
        <div class="form-error" id="reg-error"></div>
        <button class="btn-submit" id="reg-submit-btn" type="submit">Register Now</button>
      </form>
    </div>
  </div>

  <div class="success-wrap" id="reg-success">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">You're registered!</div>
    <div class="success-sub">
      Thanks, <strong id="success-name"></strong>.<br>
      We've received your registration. See you at the event!
    </div>
  </div>

  <footer>DestineVents Collective OPC · Baguio City, Philippines</footer>
</div>

<script type="module" src="apps/register/register.ts"></script>
</body>
</html>
