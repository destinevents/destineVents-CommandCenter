<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — DestineVents</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/login.css"/>
<link rel="stylesheet" href="css/components/login.css"/>
<link rel="stylesheet" href="css/components/form.css"/>
<link rel="stylesheet" href="css/components/button.css"/>
<link rel="stylesheet" href="css/components/layout.css"/>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-brand">
    <div class="lb-logo">
      <div style="display:flex;align-items:baseline;gap:0;line-height:1">
        <span class="lb-script">destine</span>
        <span class="lb-sans">vents</span>
      </div>
      <div class="lb-divider"></div>
      <div class="lb-tagline">Collective OPC · Baguio City</div>
    </div>
    <div class="lb-quote">
      One login.<br>
      <strong>Your workspace awaits.</strong>
    </div>
    <div class="lb-footer">DestineVents Collective OPC · Internal Tool</div>
  </div>
  <div class="login-form-wrap">
    <!-- Login Form -->
    <div class="login-box" id="login-form">
      <div class="login-greeting">Welcome back.</div>
      <div class="login-sub">Sign in to your workspace</div>
      <div class="login-error" id="login-error"></div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-input" id="login-email" type="email" placeholder="you@destinevents.biz" autocomplete="email"/>
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label" for="login-pass">Password</label>
        <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleSignIn()"/>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" id="login-btn" onclick="handleSignIn()">Sign In</button>
        <button class="btn btn-primary" id="signup-btn" onclick="window.location.href='signup.html'">Sign Up</button>
      </div>
    </div>

    <!-- Role Picker (shown after admin login) -->
    <div class="role-picker" id="role-picker" style="display:none">
      <h2>Where to?</h2>
      <p>You have access to all workspaces. Choose where to go.</p>
      <div class="role-btn-wrap">
        <button class="btn btn-primary" onclick="goHQ()">Go to HQ</button>
        <button class="btn btn-ghost" onclick="goIntern()">Go to Intern Center</button>
      </div>
      <div style="margin-top:24px;font-size:10px;color:var(--ink-3)">
        <a href="#" style="color:var(--ink-3);text-decoration:none" onclick="handleSignOut()">Sign out</a>
      </div>
    </div>
  </div>
</div>

<script src="utils/errorHandler.js"></script>
<script src="utils/logger.js"></script>
<script src="js/login.js"></script>
</body>
</html>
